
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Attendance System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1d2b64, #f8cdda);
    font-family: 'Segoe UI', sans-serif;
}

/* Title */
.title {
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: white;
    margin: 20px;
}

/* Cards */
.card-custom {
    border-radius: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card-custom:hover {
    transform: scale(1.02);
}

/* Button */
.btn-main {
    background: #00dbde;
    background: linear-gradient(90deg, #00dbde, #fc00ff);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 12px;
    padding: 10px;
    transition: 0.3s;
}

.btn-main:hover {
    transform: scale(1.05);
}

/* Table */
table {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #6a11cb;
    color: white;
}

/* Stats */
.stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
}

.stat-box {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    width: 30%;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">🤖 AI Face Attendance System</div>

    <!-- Stats -->
    <div class="stats text-white">
        <div class="stat-box">
            <h4>{{ totalreg }}</h4>
            <p>Total Users</p>
        </div>

        <div class="stat-box">
            <h4>{{ l }}</h4>
            <p>Present Today</p>
        </div>

        <div class="stat-box">
            <h4>{{ datetoday2 }}</h4>
            <p>Date</p>
        </div>
    </div>

    <div class="row">

        <!-- Attendance -->
        <div class="col-md-7">
            <div class="card-custom">

                <h3>📋 Attendance</h3>

                <a href="/start">
                    <button class="btn btn-main w-100 mt-3 mb-3">
                        ▶ Start Camera
                    </button>
                </a>

                <table class="table text-center">
                    <tr>
                        <th>S No</th>
                        <th>Name</th>
                        <th>ID</th>
                        <th>Time</th>
                    </tr>

                    {% for i in range(l) %}
                    <tr>
                        <td>{{ i+1 }}</td>
                        <td>{{ names[i] }}</td>
                        <td>{{ rolls[i] }}</td>
                        <td>{{ times[i] }}</td>
                    </tr>
                    {% endfor %}
                </table>

            </div>
        </div>

        <!-- Add User -->
        <div class="col-md-5">
            <div class="card-custom">

                <h3>➕ Add User</h3>

                <form action="/add" method="POST">

                    <input type="text" name="newusername"
                        class="form-control mt-3"
                        placeholder="Enter Name" required>

                    <input type="number" name="newuserid"
                        class="form-control mt-3"
                        placeholder="Enter ID" required>

                    <button class="btn btn-main w-100 mt-3">
                        Add User
                    </button>

                </form>

            </div>
        </div>

    </div>

</div>

</body>
</html>
